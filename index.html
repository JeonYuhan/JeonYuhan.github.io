<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>패션취향테스트</title>

<style>

body{
    background:black;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    text-align:center;
}

h1{
    font-size:48px;
    margin-bottom:20px;
}

.subtitle{
    font-size:18px;
    color:#cccccc;
    margin-bottom:40px;
}

.start-btn{
    background:#ff6a00;
    border:none;
    padding:18px 45px;
    font-size:22px;
    border-radius:30px;
    color:white;
    cursor:pointer;
}

.start-btn:hover{
    background:#ff8c32;
    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h1>패션취향테스트</h1>

<p class="subtitle">
사진을 선택하고 당신의 패션 스타일을 알아보세요
</p>

<button class="start-btn" onclick="startQuiz()">
테스트 시작하기
</button>

</div>

<script>

function startQuiz(){
    localStorage.removeItem("score")
    window.location.href="quiz.html"
}

</script>

</body>
</html>
